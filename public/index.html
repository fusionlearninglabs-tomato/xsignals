<!DOCTYPE html>
<html>
<head>
<title>X SIGNALS</title>
	<style>
	body {
    margin: 0;
	flex-direction:column;
    overflow: hidden; /* This hides scrollbars and prevents scrolling entirely */
    background-color: #000; /* Matches your canvas vibe */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
#game-container{
display:flex;
gap:20px;
align-items:flex-start;
}
#scoreboard{
width:200px;
height:500px;
border: 2px sold #fff;
padding:15px;
color:white;
background: #111;
overflow-y:auto;
}
.score-entry{
margin-bottom:10px;
padding:5px;
border-bottom:1px solid #333;
display:flex;
justify-content:space-between;
}

	</style>
</head>
	<body>
<div id="game-container">
	
	<div id="canvasDiv">
	<canvas id="gameCanvas" width="500" height="500" style="border: 2px solid #000; background:#222;"></canvas>
</div>
<div id="scoreboard">
<h3 style="margin-top: 0; border-bottom: 2px; solid #fff;font-family:monospace;">*SCORES*</h3>
<div id="player-list"></div>
</div>
</div>
<br>
<div id="textDiv" style="border:2px solid #fff;padding:16px;font-family:monospace;color:white;">
*CONTROLS*
<br>
Presss spacebar to enter message.
<br>
Use arrow keys to move.
<br>
*RULES*
<br> 	
Your char sends constant signals to the goal. every signal you collide with you , "intercept" changing the color toward your goal.
</div>
//beginscript
	<script src="/socket.io/socket.io.js"></script>
	
	<script>
	//audio
	let audioUnlocked=false;
	function unlockAudio(){
	if (!audioUnlocked){
	audioUnlocked=true;
	console.log ("audio unlocked");
	m_bg.play().catch(()=>{});
	}
	}
	const s_spawn=new Audio("sounds/spawn.wav");
	console.log ('audio loaded');
	const s_point=new Audio("sounds/point.wav");
	const m_bg=new Audio ("sounds/mus.mp3");
	s_spawn.volum=0.2;
	s_point.volume=0.2;
	
	m_bg.loop = true;
	m_bg.volume = 0.6;
	m_bg.play().catch(()=>{});
	
	
	
	let prevSignals={};
	let prevPlayers={};
	//init
	const socket=io();''
	const canvas=document.getElementById('gameCanvas');
	
	const ctx = canvas.getContext('2d');
	
	let allPlayers={}
	let allSignals={};
	//scoreboard
	const playerListDiv=document.getElementById('player-list');
	function updateScoreboard(){
	const sorted = Object.values(allPlayers).sort((a,b) => b.score -a.score);
	while (playerListDiv.firstChild){
	playerListDiv.removeChild(playerListDiv.firstChild);
	}
	const fragment = document.createDocumentFragment();
	
	sorted.forEach ((p,index)=>{
	const entry = document.createElement ('div');
	entry.className='score-entry';
	entry.style.color = p.color;
	
	
	const nameSpan = document.createElement('span')
	nameSpan.textContent=`${index +1}. player`;
	const scoreSpan=document.createElement('span');
	scoreSpan.textContent=p.score;
	
	entry.appendChild(nameSpan);
	entry.appendChild(scoreSpan);
	fragment.appendChild(entry);
	});
	
	playerListDiv.appendChild(fragment);
	}
	
	socket.on('updatePlayers', (serverPlayers) =>
	{
	allPlayers=serverPlayers;
	updateScoreboard()
	});
	socket.on('updateSignals',(serverSignals) => {
	allSignals=serverSignals;
	for (let id in serverSignals){
	
	if(!prevSignals[id]){
	
	s_spawn.currentTime=0;
	s_spawn.play().catch(()=>{});
	}
	}
	
	for (let id in prevSignals){
	if (!(id in serverSignals)) {
	s_point.currentTime=0;
	s_point.play().catch(()	=>{});
	}
	}
prevSignals={...serverSignals};
	});
	//Controls 
	window.addEventListener("click",unlockAudio,{once:true});
	window.addEventListener("keydown",unlockAudio,{once:true});
	
	
	window.addEventListener('keydown', (e) =>{
	//Chat
	if (e.key === ' '){
	e.preventDefault();
	const msg = prompt('Say: ');
	console.log (msg)
	if (msg){
	socket.emit('chat message',msg);
	}
	}
	
	//Movement
	const speed=5;
	if (e.key== 'ArrowUp') socket.emit('move',{x:0,y:-speed});
	if (e.key== 'ArrowDown') socket.emit('move',{x:0,y:speed});
	if (e.key== 'ArrowLeft') socket.emit('move',{x:-speed,y:0});
	if (e.key== 'ArrowRight') socket.emit('move',{x:speed,y:0});
	});
	function draw(){
	ctx.clearRect(0,0,canvas.width,canvas.height);
	
	for (let id in allPlayers){
	const p=allPlayers[id];
		//drawplayer
	ctx.fillStyle=p.color;
	ctx.fillRect(p.x,p.y,20,20);
	ctx.fillStyle=p.color;
	ctx.fillRect(p.goal.x,p.goal.y,p.goal.size,p.goal.size); 
	ctx.fillStyle="#000"
	ctx.strokeRect(p.goal.x,p.goal.y,p.goal.size,p.goal.size); 
	//drawChat
	if (p.message){
	ctx.fillStyle= "white";
	ctx.font = "14px monospace";
	ctx.textAlign="center";
	console.log(p.id+":"+p.message);
	//chatbg
	const textWidth = ctx.measureText(p.message.width);
	ctx.fillStyle="rgba(0,0,0,0.6)"
	ctx.fillRect(p.x + 10 - (textWidth/2) -5,p.y - 30, textWidth + 10,20);
	ctx.fillStyle="white";
	ctx.fillText(p.message,p.x+10,p.y - 15);
	
	}
	}
	
	//draw SIGNALS
	for(let id in allSignals){
	const sig = allSignals[id];
	ctx.fillStyle = sig.color;
	
	ctx.beginPath();
	ctx.arc(sig.x,sig.y, 6, 0 , Math.PI *2);
	ctx.fill();
	ctx.fillStyle= "white";
	ctx.beginPath();
	ctx.arc(sig.x,sig.y,2,0,Math.PI *2);
	ctx.fill ();
	}
	
	requestAnimationFrame(draw);
	}
	draw();
	</script>
	
	
	

	</html>
